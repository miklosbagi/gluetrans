# Dev / preview images for PRs to main (same-repo only).
#
# Tags (Docker Hub + GHCR for every successful run):
#   - dev-v<VERSION file>-<7-char-sha> — unique per commit (e.g. dev-v0.3.8-a1b2c3d); see repo root VERSION
#   - dev — rolling tag on each registry; same digest as that run’s unique tag. Last PR build wins on :dev.
#
# Triggers:
#   - pull_request (opened, synchronize, reopened, ready_for_review): **synchronize** runs on
#     every new commit pushed to the PR branch (including force-push), so each update gets a new image.
#   - workflow_dispatch: rebuild for a PR number without a new commit (same checks: targets main,
#     same repo, not draft).
#
# Production v* and :latest are pushed by docker-release.yml when you push a semver tag after merge.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME
#   DOCKERHUB_TOKEN      (Docker Hub access token / PAT with read & write)
#
# If either Docker Hub secret is unset, the build-push job is skipped (configure both to publish
# dev images to Docker Hub and GHCR).
#
# GHCR: GitHub forbids *naming* a repo secret GITHUB_* (reserved prefix). Use GH_TOKEN
# for a PAT with write:packages (classic) or "Contents: read" + "Packages: write"
# (fine-grained), scoped to this repo. If GH_TOKEN is unset, login uses github.token
# (same as the built-in GITHUB_TOKEN — no secret to create).
#
# Security: fork PRs are skipped — untrusted code must not receive registry credentials.
#
# Draft PRs: the Docker **job** is skipped (`draft == true`). CI (`pr-check.yml`) still runs on drafts.
# When you mark the PR ready, `ready_for_review` can run a Docker build without a new commit.
#
# Concurrency: `cancel-in-progress: false` so runs **queue** per PR. Each push gets a full build + a
# **new** PR comment with that commit’s tags. If `cancel-in-progress` were true, older runs would be
# cancelled before commenting (you would only see the latest).
#
# Images are built for linux/amd64 and linux/arm64 (Apple Silicon) via QEMU + buildx.
name: Docker (PR)

on:
  pull_request:
    branches: [main]
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number (must target main, same repo, not draft). Rebuilds image without a new commit.'
        required: true
        type: string

permissions:
  contents: read
  packages: write
  pull-requests: write
  issues: write

# Queue one run at a time per PR so each push finishes (image + comment). Do not cancel in-flight
# runs — otherwise only the last push would post a comment / publish intermediate dev-* tags.
concurrency:
  group: docker-pr-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: false

jobs:
  build-push:
    if: |
      secrets.DOCKERHUB_USERNAME != '' &&
      secrets.DOCKERHUB_TOKEN != '' &&
      ((github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.event.pull_request.draft == false) ||
      (github.event_name == 'workflow_dispatch'))
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR head SHA
        id: head
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PR="${{ github.event.inputs.pr_number }}"
          API="repos/${{ github.repository }}/pulls/${PR}"
          BASE=$(gh api "$API" --jq .base.ref)
          DRAFT=$(gh api "$API" --jq .draft)
          FORK=$(gh api "$API" --jq .head.repo.full_name)
          SHA=$(gh api "$API" --jq .head.sha)
          if [ "$BASE" != "main" ]; then
            echo "::error::PR #$PR must target main (got base: $BASE)"
            exit 1
          fi
          if [ "$DRAFT" = "true" ]; then
            echo "::error::PR #$PR is still a draft — mark ready for review first."
            exit 1
          fi
          if [ "$FORK" != "${{ github.repository }}" ]; then
            echo "::error::Fork PRs are not built (head repo: $FORK)"
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR" >> "$GITHUB_OUTPUT"

      - name: Checkout PR head
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.head.outputs.sha }}
          fetch-depth: 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          # Prefer GH_TOKEN (repo secret); never name a secret GITHUB_* — use built-in github.token if no PAT.
          password: ${{ secrets.GH_TOKEN || github.token }}

      - name: Compute dev image tags
        id: meta
        env:
          HEAD_SHA: ${{ steps.head.outputs.sha }}
        run: |
          set -euo pipefail
          SHORT=$(echo "$HEAD_SHA" | cut -c1-7)
          RAW=$(head -n1 VERSION | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          VERSION="${RAW#v}"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::VERSION file must be first line Major.Minor.Patch (optional leading v); got: ${RAW:-<empty>}"
            exit 1
          fi
          DEV_TAG="dev-v${VERSION}-${SHORT}"

          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          DOCKERHUB_IMG="docker.io/${REPO_LC}"
          GHCR_IMG="ghcr.io/${REPO_LC}"

          TAGS="${DOCKERHUB_IMG}:${DEV_TAG}"$'\n'"${GHCR_IMG}:${DEV_TAG}"
          TAGS+=$'\n'"${DOCKERHUB_IMG}:dev"
          TAGS+=$'\n'"${GHCR_IMG}:dev"

          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          LINK_DH="https://hub.docker.com/r/${REPO_LC}/tags?name=${DEV_TAG}"
          LINK_GHCR="https://github.com/${{ github.repository }}/pkgs/container/${REPO_NAME}"

          echo "dev_tag=${DEV_TAG}" >> "$GITHUB_OUTPUT"
          echo "repo_lc=${REPO_LC}" >> "$GITHUB_OUTPUT"
          echo "link_dockerhub=${LINK_DH}" >> "$GITHUB_OUTPUT"
          echo "link_ghcr=${LINK_GHCR}" >> "$GITHUB_OUTPUT"
          {
            echo 'tags<<EOF'
            echo "$TAGS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}

      - name: Post PR comment (new comment per successful build)
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          HEAD_SHA: ${{ steps.head.outputs.sha }}
          DEV_TAG: ${{ steps.meta.outputs.dev_tag }}
          REPO_LC: ${{ steps.meta.outputs.repo_lc }}
          LINK_DH: ${{ steps.meta.outputs.link_dockerhub }}
          LINK_GHCR: ${{ steps.meta.outputs.link_ghcr }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ steps.head.outputs.sha }}
        with:
          github-token: ${{ github.token }}
          script: |
            const n = parseInt(process.env.PR_NUMBER, 10);
            if (!Number.isFinite(n)) {
              throw new Error('PR_NUMBER missing');
            }
            const sha = process.env.HEAD_SHA;
            const devTag = process.env.DEV_TAG;
            const repoLc = process.env.REPO_LC;
            const linkDh = process.env.LINK_DH;
            const linkGhcr = process.env.LINK_GHCR;
            const runUrl = process.env.RUN_URL;
            const commitUrl = process.env.COMMIT_URL;
            const { owner, repo } = context.repo;
            const short = sha.slice(0, 7);
            const body = [
              '### Dev Docker image',
              '',
              `**Multi-arch** (\`linux/amd64\`, \`linux/arm64\`) for commit [\`${short}\`](${commitUrl})`,
              '',
              '| Registry | Pull |',
              '|----------|------|',
              `| **Docker Hub** | [\`docker.io/${repoLc}:${devTag}\`](${linkDh}) |`,
              `| **GHCR** | [\`ghcr.io/${repoLc}:${devTag}\`](${linkGhcr}) |`,
              '',
              `**Unique tag:** \`${devTag}\` — **rolling \`dev\`** (same digest as this build): \`docker.io/${repoLc}:dev\` and \`ghcr.io/${repoLc}:dev\`.`,
              '',
              `[Workflow run](${runUrl})`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: n,
              body,
            });
